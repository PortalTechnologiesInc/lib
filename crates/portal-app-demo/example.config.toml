## Config for portal-app-demo. Copy to ~/.portal-app-demo/config.toml
## Override via env: PORTAL_APP_DEMO__<SECTION>__<KEY>=value (double underscores)

[info]
listen_port = 3030

[nostr]
default_relays = ["wss://relay.damus.io", "wss://relay.nostr.band"]

[session]
max_sessions = 50
ttl_secs = 7200
